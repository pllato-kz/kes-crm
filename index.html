<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1200" />
  <title>KES CRM — KazEnergoSnab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,5 90,28 90,72 50,95 10,72 10,28' fill='none' stroke='%2300A6E2' stroke-width='8'/><text x='50' y='62' text-anchor='middle' font-family='Arial' font-weight='900' font-size='34' fill='%23111'>KES</text></svg>">
</head>
<body>

<div class="app">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <!-- inline SVG логотип в стиле оригинала -->
      <svg class="logo-mark" width="34" height="38" viewBox="0 0 100 110" aria-hidden="true">
        <polygon points="50,5 90,28 90,82 50,105 10,82 10,28" fill="none" stroke="#00A6E2" stroke-width="6"/>
        <text x="50" y="62" text-anchor="middle" font-family="Inter, Arial" font-weight="900" font-size="32" fill="#fff">KES</text>
        <text x="50" y="80" text-anchor="middle" font-family="Inter, Arial" font-size="9" fill="#fff" opacity=".85">KazEnergoSnab</text>
      </svg>
      <div class="logo-text">
        <b>KES CRM</b>
        <span>v0.1 mockup</span>
      </div>
    </div>

    <div class="sidebar-tenant">KazEnergoSnab • Караганда</div>

    <nav class="sidebar-nav" id="nav">
      <button data-view="dashboard"  class="active"><span class="icon">📊</span> Дашборд</button>
      <button data-view="leads"><span class="icon">📥</span> Заявки <span class="badge" data-count="leads-new">3</span></button>
      <button data-view="deals"><span class="icon">💼</span> Сделки <span class="badge" data-count="deals">12</span></button>
      <button data-view="clients"><span class="icon">👥</span> Клиенты <span class="badge" data-count="clients">15</span></button>
      <button data-view="catalog"><span class="icon">📦</span> Каталог <span class="badge" data-count="products">25</span></button>
      <button data-view="warehouse"><span class="icon">🏭</span> Склад</button>
      <button data-view="shipments"><span class="icon">🚚</span> Отгрузки</button>
      <button data-view="invoices"><span class="icon">📄</span> Документы</button>
      <button data-view="suppliers"><span class="icon">🤝</span> Поставщики</button>
      <button data-view="tasks"><span class="icon">✅</span> Задачи <span class="badge" data-count="tasks-open">7</span></button>
      <button data-view="reports"><span class="icon">📈</span> Отчёты</button>
      <button data-view="settings"><span class="icon">⚙️</span> Настройки</button>
    </nav>

    <div class="sidebar-foot">
      <span>© 2026 KES</span>
      <button id="reset-state" title="Сбросить демо-данные">Сброс</button>
    </div>
  </aside>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-title">
      <span class="crumb">CRM /</span>
      <span id="page-title">Дашборд1</span>
    </div>
    <div class="header-search">
      <input id="search" type="search" placeholder="Поиск по клиентам, сделкам, SKU…" />
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="Уведомления" id="notif-btn">🔔<span class="dot"></span></button>
      <button class="icon-btn" title="Помощь">?</button>
      <div class="user-chip">
        <div class="avatar" style="background:#111">Т</div>
        <div>
          <div class="name">Тимур</div>
          <div class="role">Директор</div>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main" id="main">
    <!-- Контент рендерится из app.js по выбранному data-view -->
    <div class="empty"><div class="em-icon">⏳</div><div class="em-text">Загрузка…</div></div>
  </main>
</div>

<!-- ===== TOAST + DROPDOWN ===== -->
<div class="toast-stack" id="toasts"></div>
<div id="dropdown-root"></div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">—</h3>
      <button id="modal-close" aria-label="Закрыть">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script>
  window.__errors = [];
  window.addEventListener('error', (e) => {
    window.__errors.push({ msg: e.message, src: (e.filename||'').split('/').pop(), line: e.lineno, col: e.colno });
    try {
      const main = document.querySelector('#main');
      if (main) main.innerHTML = '<pre style="color:#b91c1c;padding:24px;white-space:pre-wrap">' + JSON.stringify(window.__errors, null, 2) + '</pre>';
    } catch (_) {}
  }, true);
</script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
