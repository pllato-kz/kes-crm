<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KES CRM — KazEnergoSnab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,5 90,28 90,72 50,95 10,72 10,28' fill='none' stroke='%2300A6E2' stroke-width='8'/><text x='50' y='62' text-anchor='middle' font-family='Arial' font-weight='900' font-size='34' fill='%23111'>KES</text></svg>">
</head>
<body>

<!-- Нейтральный экран загрузки. Реальный интерфейс рисует app.js (renderShell/renderLogin),
     полностью заменяя содержимое body — поэтому здесь нет статичной демо-разметки,
     которая раньше «мигала» при перезагрузке. -->
<div class="boot-splash" id="boot-splash">
  <svg width="56" height="62" viewBox="0 0 100 110" aria-hidden="true">
    <polygon points="50,5 90,28 90,82 50,105 10,82 10,28" fill="none" stroke="#00A6E2" stroke-width="6"/>
    <text x="50" y="62" text-anchor="middle" font-family="Inter, Arial" font-weight="900" font-size="32" fill="#111">KES</text>
    <text x="50" y="80" text-anchor="middle" font-family="Inter, Arial" font-size="9" fill="#111" opacity=".85">KazEnergoSnab</text>
  </svg>
  <div class="boot-spinner" aria-hidden="true"></div>
  <div class="boot-text">Загрузка…</div>
</div>

<script>
  window.__errors = [];
  window.addEventListener('error', (e) => {
    window.__errors.push({ msg: e.message, src: (e.filename||'').split('/').pop(), line: e.lineno, col: e.colno });
    try {
      // во время загрузки #main ещё нет — показываем ошибку в сплэше, иначе body не зависнет на спиннере
      const host = document.querySelector('#main') || document.querySelector('#boot-splash') || document.body;
      if (host) host.innerHTML = '<pre style="color:#b91c1c;padding:24px;white-space:pre-wrap">' + JSON.stringify(window.__errors, null, 2) + '</pre>';
    } catch (_) {}
  }, true);
</script>
<script src="api.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
