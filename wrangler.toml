# ============================================================================
# KES CRM — конфигурация Cloudflare Pages + Functions (бэкенд, Слой 2)
#
# Клиент-независимость: при передаче проекта другому клиенту меняется ТОЛЬКО
# этот файл (его ресурсы D1/R2), код остаётся прежним. Имена биндингов в коде
# универсальные: DB (база), BUCKET (файлы).
#
# Ресурсы созданы пользователем заранее (Слой 0) — новые НЕ создаём.
# ============================================================================

name = "kes-crm"
compatibility_date = "2024-11-01"

# Корень проекта — он же каталог статики Pages. Функции берутся из ./functions/.
# Что НЕ публиковать в статике — см. .assetsignore (schema.sql, доки и т.п.).
pages_build_output_dir = "."

# --- D1: база данных (kes-crm-db) ---
[[d1_databases]]
binding = "DB"
database_name = "kes-crm-db"
database_id = "e90e27ec-310f-4774-aba7-37c04f74babc"

# --- R2: файлы и вложения (kes-crm-files) ---
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "kes-crm-files"
